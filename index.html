<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />

<body>
  <div class="container">
    <div class="card">
      <h1>Oi samantha do you still want <br />my friendship 🥺</h1>

      </div>
    </div>

  </div>
